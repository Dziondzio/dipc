name: release

on:
  workflow_dispatch:
    inputs:
      notes:
        description: release notes
        required: false
        default: ""
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: version
        id: v
        shell: pwsh
        run: |
          [xml]$xml = Get-Content .\DipcClient\DipcClient.csproj
          $prefix = $xml.Project.PropertyGroup.VersionPrefix | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($prefix)) { $prefix = "1.0.0" }
          $suffix = (Get-Date).ToUniversalTime().ToString("yyyyMMddHHmm")
          $version = "$prefix-$suffix"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "suffix=$suffix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: publish portable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dist | Out-Null
          dotnet publish .\DipcClient\DipcClient.csproj -c Release -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -p:PublishTrimmed=false -p:IncludeNativeLibrariesForSelfExtract=true -p:VersionSuffix=${{ steps.v.outputs.suffix }}
          $src = ".\DipcClient\bin\Release\net8.0-windows\win-x64\publish\DipcClient.exe"
          $dst = ".\dist\DIPC_Portable_${{ steps.v.outputs.version }}.exe"
          Copy-Item -Force $src $dst
          (Get-FileHash -Algorithm SHA256 -Path $dst).Hash | Set-Content -Encoding ascii -Path "$dst.sha256"

      - name: build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $cmd = Get-Command "ISCC.exe" -ErrorAction SilentlyContinue
          $iscc = $null
          if ($cmd -and (Test-Path -LiteralPath $cmd.Source)) { $iscc = $cmd.Source }
          if (-not $iscc) {
            $candidates = @(
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
              "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
              "$env:LOCALAPPDATA\Programs\Inno Setup\ISCC.exe"
            ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
            if ($candidates.Count -gt 0) { $iscc = $candidates[0] }
          }
          if (-not $iscc) {
            throw "ISCC.exe not found. Tried PATH + standard install locations."
          }
          $portable = Resolve-Path ".\dist\DIPC_Portable_${{ steps.v.outputs.version }}.exe"
          & $iscc "/DMyAppVersion=${{ steps.v.outputs.version }}" "/DSourceExe=$portable" "/O$((Resolve-Path .\dist).Path)" .\DIPC.iss
          $installer = Resolve-Path ".\dist\DIPC_Installer_${{ steps.v.outputs.version }}.exe"
          (Get-FileHash -Algorithm SHA256 -Path $installer).Hash | Set-Content -Encoding ascii -Path "$installer.sha256"

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.v.outputs.version }}
          name: v${{ steps.v.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.sha256
